<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f9ff"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#4a3fcc"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#F06926"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e2a5a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="screenBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1b3a"/>
      <stop offset="100%" stop-color="#13112a"/>
    </linearGradient>
    <filter id="cardShadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#221F3B" flood-opacity="0.08"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#221F3B" flood-opacity="0.12"/>
    </filter>
    <clipPath id="screenClip">
      <rect x="78" y="88" width="284" height="172" rx="2"/>
    </clipPath>
  </defs>

  <!-- Subtle background glow -->
  <circle cx="220" cy="220" r="220" fill="#6C63FF" opacity="0.03"/>
  <circle cx="450" cy="340" r="140" fill="#FF9800" opacity="0.02"/>

  <!-- === MAIN LAPTOP === -->
  <g filter="url(#cardShadow)">
    <!-- Laptop screen bezel -->
    <rect x="60" y="70" width="320" height="200" rx="12" fill="#2d2950" stroke="#3d3870" stroke-width="1"/>
    <!-- Screen area -->
    <g clip-path="url(#screenClip)">
      <rect x="78" y="88" width="284" height="172" fill="url(#screenBg)"/>
      <!-- Dashboard UI inside screen -->
      <!-- Sidebar -->
      <rect x="78" y="88" width="52" height="172" fill="#16132e"/>
      <circle cx="104" cy="108" r="8" fill="#6C63FF" opacity="0.3"/>
      <rect x="92" y="126" width="24" height="3" rx="1.5" fill="#6C63FF" opacity="0.5"/>
      <rect x="92" y="137" width="24" height="3" rx="1.5" fill="white" opacity="0.12"/>
      <rect x="92" y="148" width="24" height="3" rx="1.5" fill="white" opacity="0.12"/>
      <rect x="92" y="159" width="24" height="3" rx="1.5" fill="white" opacity="0.12"/>
      <rect x="92" y="170" width="24" height="3" rx="1.5" fill="white" opacity="0.12"/>
      <!-- Active indicator -->
      <rect x="78" y="124" width="3" height="10" rx="1.5" fill="#6C63FF"/>

      <!-- Main content area -->
      <!-- Header bar -->
      <rect x="142" y="96" width="80" height="6" rx="3" fill="white" opacity="0.2"/>
      <circle cx="340" cy="99" r="6" fill="#6C63FF" opacity="0.3"/>
      <circle cx="352" cy="99" r="6" fill="#FF9800" opacity="0.2"/>

      <!-- Stat cards row -->
      <rect x="142" y="114" width="58" height="36" rx="6" fill="white" opacity="0.06"/>
      <rect x="152" y="122" width="28" height="5" rx="2.5" fill="#6C63FF" opacity="0.5"/>
      <rect x="152" y="132" width="38" height="4" rx="2" fill="white" opacity="0.15"/>
      <rect x="152" y="140" width="20" height="3" rx="1.5" fill="#4caf50" opacity="0.5"/>

      <rect x="208" y="114" width="58" height="36" rx="6" fill="white" opacity="0.06"/>
      <rect x="218" y="122" width="32" height="5" rx="2.5" fill="#FF9800" opacity="0.5"/>
      <rect x="218" y="132" width="38" height="4" rx="2" fill="white" opacity="0.15"/>
      <rect x="218" y="140" width="24" height="3" rx="1.5" fill="#6C63FF" opacity="0.4"/>

      <rect x="274" y="114" width="58" height="36" rx="6" fill="white" opacity="0.06"/>
      <rect x="284" y="122" width="26" height="5" rx="2.5" fill="#8B83FF" opacity="0.5"/>
      <rect x="284" y="132" width="38" height="4" rx="2" fill="white" opacity="0.15"/>
      <rect x="284" y="140" width="18" height="3" rx="1.5" fill="#FF9800" opacity="0.4"/>

      <!-- Chart area -->
      <rect x="142" y="160" width="122" height="88" rx="6" fill="white" opacity="0.04"/>
      <rect x="152" y="168" width="40" height="4" rx="2" fill="white" opacity="0.2"/>
      <!-- Bar chart -->
      <rect x="156" y="224" width="12" height="16" rx="2" fill="#6C63FF" opacity="0.4"/>
      <rect x="174" y="214" width="12" height="26" rx="2" fill="#6C63FF" opacity="0.55"/>
      <rect x="192" y="206" width="12" height="34" rx="2" fill="url(#purple)" opacity="0.7"/>
      <rect x="210" y="218" width="12" height="22" rx="2" fill="#6C63FF" opacity="0.5"/>
      <rect x="228" y="210" width="12" height="30" rx="2" fill="#FF9800" opacity="0.6"/>
      <rect x="246" y="198" width="12" height="42" rx="2" fill="url(#orange)" opacity="0.7"/>
      <!-- Chart grid lines -->
      <line x1="152" y1="240" x2="262" y2="240" stroke="white" stroke-width="0.5" opacity="0.1"/>
      <line x1="152" y1="220" x2="262" y2="220" stroke="white" stroke-width="0.5" opacity="0.06"/>
      <line x1="152" y1="200" x2="262" y2="200" stroke="white" stroke-width="0.5" opacity="0.04"/>

      <!-- Right panel - list items -->
      <rect x="274" y="160" width="80" height="88" rx="6" fill="white" opacity="0.04"/>
      <rect x="284" y="168" width="34" height="4" rx="2" fill="white" opacity="0.18"/>

      <circle cx="290" cy="184" r="4" fill="#4caf50" opacity="0.5"/>
      <rect x="300" y="182" width="44" height="4" rx="2" fill="white" opacity="0.12"/>

      <circle cx="290" cy="198" r="4" fill="#6C63FF" opacity="0.5"/>
      <rect x="300" y="196" width="38" height="4" rx="2" fill="white" opacity="0.12"/>

      <circle cx="290" cy="212" r="4" fill="#FF9800" opacity="0.5"/>
      <rect x="300" y="210" width="48" height="4" rx="2" fill="white" opacity="0.12"/>

      <circle cx="290" cy="226" r="4" fill="#6C63FF" opacity="0.4"/>
      <rect x="300" y="224" width="32" height="4" rx="2" fill="white" opacity="0.1"/>

      <circle cx="290" cy="240" r="4" fill="#4caf50" opacity="0.4"/>
      <rect x="300" y="238" width="40" height="4" rx="2" fill="white" opacity="0.08"/>
    </g>
    <!-- Screen bezel highlight -->
    <rect x="78" y="88" width="284" height="1" fill="white" opacity="0.05"/>
  </g>

  <!-- Laptop base/keyboard -->
  <path d="M40 270 L60 270 Q60 270 60 270 L380 270 Q380 270 380 270 L400 270 L390 290 Q388 294 384 294 L56 294 Q52 294 50 290 Z" fill="#2d2950" stroke="#3d3870" stroke-width="0.8"/>
  <!-- Trackpad -->
  <rect x="190" y="276" width="60" height="10" rx="3" fill="#3d3870" opacity="0.6"/>
  <!-- Keyboard dots -->
  <rect x="100" y="276" width="70" height="2" rx="1" fill="#3d3870" opacity="0.5"/>
  <rect x="100" y="282" width="70" height="2" rx="1" fill="#3d3870" opacity="0.4"/>
  <rect x="270" y="276" width="70" height="2" rx="1" fill="#3d3870" opacity="0.5"/>
  <rect x="270" y="282" width="70" height="2" rx="1" fill="#3d3870" opacity="0.4"/>

  <!-- === FLOATING CARD: Server uptime (top-right) === -->
  <g filter="url(#softShadow)">
    <rect x="410" y="60" width="165" height="100" rx="16" fill="url(#cardGrad)"/>
    <!-- Uptime indicator -->
    <circle cx="448" cy="92" r="18" fill="#6C63FF" opacity="0.08"/>
    <circle cx="448" cy="92" r="12" fill="none" stroke="#6C63FF" stroke-width="2.5" stroke-dasharray="62 76" stroke-dashoffset="-14" stroke-linecap="round"/>
    <text x="448" y="96" text-anchor="middle" fill="#6C63FF" font-size="9" font-weight="700" font-family="Inter, system-ui, sans-serif">99%</text>
    <text x="478" y="88" fill="#221F3B" font-size="10" font-weight="700" font-family="Inter, system-ui, sans-serif">Uptime</text>
    <text x="478" y="102" fill="#8888a0" font-size="8" font-family="Inter, system-ui, sans-serif">All systems online</text>
    <!-- Mini sparkline -->
    <polyline points="428,138 440,134 452,136 464,130 476,132 488,126 500,128 512,122 524,118 536,120 548,114 558,116" fill="none" stroke="#6C63FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
    <polyline points="428,138 440,134 452,136 464,130 476,132 488,126 500,128 512,122 524,118 536,120 548,114 558,116 558,145 428,145" fill="#6C63FF" opacity="0.04"/>
  </g>

  <!-- === FLOATING CARD: Security badge (left) === -->
  <g filter="url(#softShadow)">
    <rect x="8" y="160" width="72" height="88" rx="14" fill="url(#cardGrad)"/>
    <circle cx="44" cy="192" r="18" fill="#FF9800" opacity="0.08"/>
    <!-- Shield icon -->
    <path d="M44 178 l-14 7 v12 c0 9 6 16 14 20 8-4 14-11 14-20 v-12 z" fill="none" stroke="url(#orange)" stroke-width="2" stroke-linejoin="round"/>
    <path d="M37 196 l5 5 10-10" stroke="#FF9800" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="22" y="224" width="44" height="4" rx="2" fill="#221F3B" opacity="0.35"/>
    <rect x="28" y="234" width="32" height="3" rx="1.5" fill="#8888a0" opacity="0.2"/>
  </g>

  <!-- === FLOATING CARD: Team count (bottom-left) === -->
  <g filter="url(#softShadow)">
    <rect x="30" y="310" width="150" height="70" rx="14" fill="url(#cardGrad)"/>
    <!-- Avatar stack -->
    <circle cx="62" cy="340" r="14" fill="#6C63FF" opacity="0.12" stroke="white" stroke-width="2"/>
    <circle cx="62" cy="336" r="6" fill="#6C63FF" opacity="0.35"/>
    <circle cx="82" cy="340" r="14" fill="#8B83FF" opacity="0.12" stroke="white" stroke-width="2"/>
    <circle cx="82" cy="336" r="6" fill="#8B83FF" opacity="0.35"/>
    <circle cx="102" cy="340" r="14" fill="#FF9800" opacity="0.12" stroke="white" stroke-width="2"/>
    <circle cx="102" cy="336" r="6" fill="#FF9800" opacity="0.35"/>
    <circle cx="122" cy="340" r="14" fill="#4caf50" opacity="0.12" stroke="white" stroke-width="2"/>
    <text x="122" y="344" text-anchor="middle" fill="#4caf50" font-size="9" font-weight="700" font-family="Inter, system-ui, sans-serif">+</text>
    <text x="145" y="344" fill="#221F3B" font-size="10" font-weight="700" font-family="Inter, system-ui, sans-serif">50+</text>
    <text x="50" y="368" fill="#8888a0" font-size="8" font-family="Inter, system-ui, sans-serif">Certified professionals worldwide</text>
  </g>

  <!-- === FLOATING CARD: Growth metric (bottom-right) === -->
  <g filter="url(#softShadow)">
    <rect x="390" y="290" width="170" height="86" rx="16" fill="url(#cardGrad)"/>
    <text x="410" y="318" fill="#221F3B" font-size="10" font-weight="600" font-family="Inter, system-ui, sans-serif">Client Satisfaction</text>
    <!-- Progress bar -->
    <rect x="410" y="330" width="130" height="8" rx="4" fill="#e8e8f0"/>
    <rect x="410" y="330" width="118" height="8" rx="4" fill="url(#purple)"/>
    <text x="410" y="354" fill="#6C63FF" font-size="18" font-weight="800" font-family="Inter, system-ui, sans-serif">98%</text>
    <text x="448" y="354" fill="#8888a0" font-size="8" font-family="Inter, system-ui, sans-serif">satisfaction rate</text>
    <!-- Trend arrow -->
    <path d="M530 345 l-8 12 h5 v8 h6 v-8 h5 z" fill="#4caf50" opacity="0.5" transform="rotate(180 530 353)"/>
  </g>

  <!-- Connection lines from laptop to cards (subtle) -->
  <line x1="380" y1="150" x2="410" y2="110" stroke="#6C63FF" stroke-width="1" stroke-dasharray="4 4" opacity="0.12"/>
  <line x1="60" y1="210" x2="80" y2="204" stroke="#FF9800" stroke-width="1" stroke-dasharray="4 4" opacity="0.12"/>
  <line x1="180" y1="294" x2="130" y2="310" stroke="#6C63FF" stroke-width="1" stroke-dasharray="4 4" opacity="0.08"/>
  <line x1="380" y1="270" x2="400" y2="300" stroke="#6C63FF" stroke-width="1" stroke-dasharray="4 4" opacity="0.1"/>

  <!-- Small decorative dots -->
  <circle cx="420" cy="200" r="3" fill="#6C63FF" opacity="0.15"/>
  <circle cx="15" cy="130" r="3" fill="#FF9800" opacity="0.12"/>
  <circle cx="550" cy="250" r="4" fill="#6C63FF" opacity="0.1"/>
  <circle cx="300" cy="400" r="3" fill="#FF9800" opacity="0.08"/>
  <circle cx="500" cy="400" r="3" fill="#6C63FF" opacity="0.06"/>
</svg>
