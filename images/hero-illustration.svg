<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#221F3B" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#221F3B"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#6C63FF"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2e2a5a"/>
      <stop offset="100%" stop-color="#221F3B"/>
    </linearGradient>
  </defs>

  <!-- Background blobs -->
  <circle cx="480" cy="100" r="160" fill="url(#g1)"/>
  <circle cx="120" cy="380" r="120" fill="url(#g1)"/>

  <!-- Main monitor -->
  <rect x="120" y="60" width="360" height="230" rx="16" fill="url(#screen)" stroke="#3d3870" stroke-width="2"/>
  <!-- Screen content - code lines -->
  <rect x="150" y="95" width="120" height="8" rx="4" fill="#6C63FF" opacity="0.7"/>
  <rect x="150" y="115" width="180" height="8" rx="4" fill="#8B83FF" opacity="0.4"/>
  <rect x="150" y="135" width="90" height="8" rx="4" fill="#FF9800" opacity="0.6"/>
  <rect x="250" y="135" width="130" height="8" rx="4" fill="#6C63FF" opacity="0.3"/>
  <rect x="150" y="155" width="200" height="8" rx="4" fill="#8B83FF" opacity="0.35"/>
  <rect x="150" y="175" width="60" height="8" rx="4" fill="#FF9800" opacity="0.5"/>
  <rect x="220" y="175" width="140" height="8" rx="4" fill="#6C63FF" opacity="0.45"/>
  <rect x="150" y="195" width="160" height="8" rx="4" fill="#8B83FF" opacity="0.3"/>
  <rect x="150" y="215" width="100" height="8" rx="4" fill="#6C63FF" opacity="0.5"/>
  <rect x="260" y="215" width="80" height="8" rx="4" fill="#FF9800" opacity="0.4"/>
  <rect x="150" y="235" width="180" height="8" rx="4" fill="#8B83FF" opacity="0.25"/>

  <!-- Monitor stand -->
  <rect x="270" y="290" width="60" height="30" rx="4" fill="#3d3870"/>
  <rect x="240" y="316" width="120" height="10" rx="5" fill="#3d3870"/>

  <!-- Floating elements - cloud -->
  <rect x="420" y="80" width="130" height="80" rx="12" fill="white" stroke="#e8e8f0" stroke-width="1.5" opacity="0.95"/>
  <circle cx="455" cy="105" r="14" fill="#6C63FF" opacity="0.15"/>
  <path d="M448 105 l7-7 7 7" stroke="#6C63FF" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M455 98 v14" stroke="#6C63FF" stroke-width="2" stroke-linecap="round"/>
  <rect x="480" y="98" width="50" height="6" rx="3" fill="#221F3B" opacity="0.6"/>
  <rect x="480" y="112" width="35" height="5" rx="2.5" fill="#8888a0" opacity="0.4"/>
  <!-- Cloud progress bar -->
  <rect x="440" y="135" width="90" height="6" rx="3" fill="#e8e8f0"/>
  <rect x="440" y="135" width="62" height="6" rx="3" fill="url(#g3)"/>

  <!-- Floating element - shield/security -->
  <rect x="40" y="120" width="65" height="75" rx="12" fill="white" stroke="#e8e8f0" stroke-width="1.5" opacity="0.95"/>
  <path d="M72.5 140 l-12 6 v14 c0 8 5 14 12 17 7-3 12-9 12-17 v-14 z" fill="#6C63FF" opacity="0.15" stroke="#6C63FF" stroke-width="1.5"/>
  <path d="M67 156 l4 4 8-8" stroke="#6C63FF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Floating element - chart -->
  <rect x="60" y="240" width="55" height="55" rx="10" fill="white" stroke="#e8e8f0" stroke-width="1.5" opacity="0.95"/>
  <rect x="72" y="272" width="8" height="12" rx="2" fill="#FF9800" opacity="0.7"/>
  <rect x="84" y="262" width="8" height="22" rx="2" fill="#6C63FF" opacity="0.5"/>
  <rect x="96" y="256" width="8" height="28" rx="2" fill="#6C63FF" opacity="0.8"/>

  <!-- Floating element - gear -->
  <circle cx="510" cy="220" r="28" fill="white" stroke="#e8e8f0" stroke-width="1.5" opacity="0.95"/>
  <circle cx="510" cy="220" r="12" fill="none" stroke="#6C63FF" stroke-width="2.5" opacity="0.6"/>
  <circle cx="510" cy="220" r="5" fill="#6C63FF" opacity="0.3"/>
  <!-- Gear teeth -->
  <rect x="506" y="196" width="8" height="8" rx="2" fill="#6C63FF" opacity="0.4"/>
  <rect x="506" y="236" width="8" height="8" rx="2" fill="#6C63FF" opacity="0.4"/>
  <rect x="486" y="216" width="8" height="8" rx="2" fill="#6C63FF" opacity="0.4"/>
  <rect x="526" y="216" width="8" height="8" rx="2" fill="#6C63FF" opacity="0.4"/>

  <!-- Connection lines (dashed) -->
  <line x1="105" y1="157" x2="120" y2="160" stroke="#6C63FF" stroke-width="1" stroke-dasharray="4 3" opacity="0.3"/>
  <line x1="115" y1="267" x2="130" y2="250" stroke="#6C63FF" stroke-width="1" stroke-dasharray="4 3" opacity="0.3"/>
  <line x1="480" y1="120" x2="470" y2="120" stroke="#6C63FF" stroke-width="1" stroke-dasharray="4 3" opacity="0.3"/>
  <line x1="482" y1="220" x2="470" y2="210" stroke="#6C63FF" stroke-width="1" stroke-dasharray="4 3" opacity="0.3"/>

  <!-- Floating dots -->
  <circle cx="200" cy="50" r="4" fill="#6C63FF" opacity="0.2"/>
  <circle cx="430" cy="310" r="3" fill="#FF9800" opacity="0.3"/>
  <circle cx="530" cy="160" r="3" fill="#6C63FF" opacity="0.25"/>
  <circle cx="50" cy="200" r="3" fill="#FF9800" opacity="0.2"/>
  <circle cx="350" cy="370" r="5" fill="#6C63FF" opacity="0.12"/>

  <!-- Network nodes at bottom -->
  <circle cx="180" cy="380" r="16" fill="white" stroke="#6C63FF" stroke-width="1.5" opacity="0.8"/>
  <circle cx="180" cy="380" r="6" fill="#6C63FF" opacity="0.4"/>
  <circle cx="300" cy="400" r="16" fill="white" stroke="#FF9800" stroke-width="1.5" opacity="0.8"/>
  <circle cx="300" cy="400" r="6" fill="#FF9800" opacity="0.4"/>
  <circle cx="420" cy="380" r="16" fill="white" stroke="#6C63FF" stroke-width="1.5" opacity="0.8"/>
  <circle cx="420" cy="380" r="6" fill="#6C63FF" opacity="0.4"/>

  <!-- Network connections -->
  <line x1="196" y1="380" x2="284" y2="400" stroke="#6C63FF" stroke-width="1.2" stroke-dasharray="6 4" opacity="0.25"/>
  <line x1="316" y1="400" x2="404" y2="380" stroke="#6C63FF" stroke-width="1.2" stroke-dasharray="6 4" opacity="0.25"/>
  <line x1="196" y1="375" x2="404" y2="375" stroke="#6C63FF" stroke-width="1" stroke-dasharray="4 4" opacity="0.12"/>
</svg>
