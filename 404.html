<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="icon" href="images/favicon.ico" sizes="32x32 64x64">
    <link rel="icon" type="image/png" sizes="192x192" href="images/favicon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            background: var(--light-bg, #f7f8fc);
            position: relative;
            overflow: hidden;
        }
        .error-content {
            position: relative;
            z-index: 1;
        }
        .error-content h1 {
            font-size: 9rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent, #6C63FF), var(--primary, #221F3B));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            line-height: 1;
        }
        .error-content h2 {
            font-size: 2rem;
            color: var(--dark, #1a1a2e);
            margin-bottom: 16px;
            font-weight: 700;
        }
        .error-content p {
            font-size: 1.1rem;
            color: var(--muted, #8888a0);
            margin-bottom: 36px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.7;
        }
    </style>
</head>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="images/tekra-dark.svg" alt="Tekra Solutions">

            <ul class="nav-menu">

                <li><a href="index.html#contact" class="nav-link">Contact Us</a></li>

    <section class="error-page">
        <div class="error-content">
            <h1>404</h1>
            <h2>Page Not Found</h2>
